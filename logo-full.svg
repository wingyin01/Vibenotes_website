<svg width="750" height="240" viewBox="0 0 750 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="round"><rect x="0" y="0" width="200" height="200" rx="44"/></clipPath>
    <radialGradient id="rg1" cx="18%" cy="78%" r="80%">
      <stop offset="0"  stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="1"  stop-color="#C026D3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg2" cx="85%" cy="18%" r="80%">
      <stop offset="0"  stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="1"  stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F0F1A"/>
      <stop offset="1" stop-color="#1A1625"/>
    </linearGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softCore" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.7" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="screen"/>
    </filter>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- App Icon (scaled to 200x200) -->
  <g transform="translate(20, 20)">
    <g clip-path="url(#round)">
      <rect width="200" height="200" fill="url(#base)"/>
      <rect width="200" height="200" fill="url(#rg1)"/>
      <rect width="200" height="200" fill="url(#rg2)"/>
    </g>

    <g transform="translate(28.57, 28.57)" filter="url(#bloom)" opacity="0.95">
      <rect x="0" y="0" width="142.86" height="142.86" rx="14.29" fill="#2A2A3E" fill-opacity="0.92"/>
      <path d="M142.86 35.71 L107.14 0 v29.46 c0 3.57 2.68 6.25 6.25 6.25 h29.47 z" fill="#3B3555" opacity="0.85"/>
    </g>

    <g transform="translate(28.57, 28.57)">
      <path d="M24.57 93.71 C39.06 93.71, 44.18 75.86, 53.59 75.86 C63 75.86, 68.12 111.57, 77.53 111.57 C86.94 111.57, 92.06 84.86, 101.47 84.86 C110.88 84.86, 115.99 102.71, 125.41 102.71 C134.82 102.71, 139.93 93.71, 149.35 93.71" fill="none" stroke="#8B5CF6" stroke-opacity="0.5" stroke-width="8.03" filter="url(#bloom)"/>
      <path d="M24.57 93.71 C39.06 93.71, 44.18 75.86, 53.59 75.86 C63 75.86, 68.12 111.57, 77.53 111.57 C86.94 111.57, 92.06 84.86, 101.47 84.86 C110.88 84.86, 115.99 102.71, 125.41 102.71 C134.82 102.71, 139.93 93.71, 149.35 93.71" fill="none" stroke="url(#ink)" stroke-width="5.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softCore)"/>
      <path d="M24.57 93.71 C39.06 93.71, 44.18 75.86, 53.59 75.86 C63 75.86, 68.12 111.57, 77.53 111.57 C86.94 111.57, 92.06 84.86, 101.47 84.86 C110.88 84.86, 115.99 102.71, 125.41 102.71 C134.82 102.71, 139.93 93.71, 149.35 93.71" fill="none" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.34"/>
      <path d="M32.35 120.51 H119.47" stroke="#22D3EE" stroke-width="4.02" stroke-linecap="round" opacity="0.6"/>
      
      <!-- AI Sparkles -->
      <g filter="url(#bloom)">
        <path d="M 129.49 44.64 L 131.7 49.08 L 136.15 51.29 L 131.7 53.5 L 129.49 57.94 L 127.28 53.5 L 122.84 51.29 L 127.28 49.08 Z" fill="url(#ink)" opacity="0.95"/>
        <path d="M 26.8 40.18 L 28.57 43.75 L 32.14 45.53 L 28.57 47.3 L 26.8 50.87 L 25.03 47.3 L 21.46 45.53 L 25.03 43.75 Z" fill="#FBBF24" opacity="0.85"/>
        <path d="M 133.95 116.05 L 135.28 118.75 L 138 120.08 L 135.28 121.41 L 133.95 124.11 L 132.62 121.41 L 129.92 120.08 L 132.62 118.75 Z" fill="#22D3EE" opacity="0.85"/>
        <path d="M 17.86 62.5 L 18.98 64.84 L 21.22 65.96 L 18.98 67.09 L 17.86 69.33 L 16.74 67.09 L 14.5 65.96 L 16.74 64.84 Z" fill="#A78BFA" opacity="0.8"/>
      </g>
    </g>
  </g>

  <!-- Vertical Separator Line -->
  <line x1="270" y1="60" x2="270" y2="180" stroke="#4B5563" stroke-width="2" opacity="0.4"/>

  <!-- Wave Icon - centered and scaled -->
  <g transform="translate(390, 5) scale(2.2)">
    <!-- Background glow layer -->
    <path d="M0 40 C15 40, 22 20, 32 20 C42 20, 49 60, 59 60 C69 60, 76 32, 86 32 C96 32, 103 48, 113 48 C123 48, 130 40, 140 40" 
          fill="none" stroke="#8B5CF6" stroke-opacity="0.5" stroke-width="9" filter="url(#bloom)"/>
    <!-- Main gradient stroke -->
    <path d="M0 40 C15 40, 22 20, 32 20 C42 20, 49 60, 59 60 C69 60, 76 32, 86 32 C96 32, 103 48, 113 48 C123 48, 130 40, 140 40" 
          fill="none" stroke="url(#ink)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#softCore)"/>
    <!-- White highlight -->
    <path d="M0 40 C15 40, 22 20, 32 20 C42 20, 49 60, 59 60 C69 60, 76 32, 86 32 C96 32, 103 48, 113 48 C123 48, 130 40, 140 40" 
          fill="none" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.5"/>
  </g>

  <!-- Company Name -->
  <text x="320" y="145" font-family="Arial, sans-serif" font-size="65" font-weight="700" fill="#1F2937" letter-spacing="-1">
    VIBE
  </text>
  <text x="320" y="180" font-family="Arial, sans-serif" font-size="30" font-weight="300" fill="#6B5CF6" letter-spacing="8">
    TECHNOLOGY
  </text>
</svg>

