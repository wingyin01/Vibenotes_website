<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Basic Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0a;
            color: white;
            font-family: sans-serif;
        }
        #test-canvas {
            width: 600px;
            height: 400px;
            border: 2px solid #6366f1;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Three.js Basic Test</h1>
    <p>If Three.js is working, you should see a rotating green cube below:</p>
    <div id="test-canvas"></div>
    <div id="status"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const status = document.getElementById('status');
        
        try {
            status.innerHTML += '<p>✓ Three.js loaded: ' + THREE.REVISION + '</p>';
            
            // Setup
            const container = document.getElementById('test-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 600/400, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer();
            
            renderer.setSize(600, 400);
            container.appendChild(renderer.domElement);
            
            status.innerHTML += '<p>✓ Renderer created</p>';
            
            // Create a simple cube
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            
            camera.position.z = 3;
            
            status.innerHTML += '<p>✓ Cube created</p>';
            
            // Animation
            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            
            animate();
            status.innerHTML += '<p>✓ Animation started</p>';
            
        } catch (error) {
            status.innerHTML += '<p style="color: red;">✗ Error: ' + error.message + '</p>';
            console.error(error);
        }
    </script>
</body>
</html>
